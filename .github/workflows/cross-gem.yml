name: Cross-compile native gem

# Produces prebuilt binary gems for the common Ruby-supported platforms so
# end users (linux-x64-gnu, linux-arm64, darwin-x64, darwin-arm64) install
# without needing a Rust toolchain. Triggered manually or on a v* tag push.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  ci-data:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - id: fetch
        uses: oxidize-rb/actions/fetch-ci-data@v1
        with:
          stable-ruby-versions: |
            exclude: ['head']

  cross-gem:
    name: Compile native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: ci-data
    strategy:
      fail-fast: false
      matrix:
        # HANDOVER §8.4 matrix. musl and windows are out of scope until a user
        # asks — adding them later is a one-line change.
        platform:
          - x86_64-linux
          - aarch64-linux
          - x86_64-darwin
          - arm64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: oxidize-rb/cross-gem-action@v9
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ needs.ci-data.outputs.result }}

      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.platform }}
          path: pkg/*.gem

  source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
